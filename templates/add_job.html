<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🤖 AI Job Tracker</span>
    <a href="/" class="btn btn-secondary btn-sm">← Back</a>
</nav>

<div class="container mt-5">
    <div class="card p-4 shadow" style="max-width:500px; margin:auto;">
        <h4 class="mb-4">➕ Add New Application</h4>
        <form method="POST">
            <div class="mb-3">
                <label>Company Name</label>
                <input type="text" name="company" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Job Role</label>
                <input type="text" name="role" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Status</label>
                <select name="status" class="form-control">
                    <option>Applied</option>
                    <option>Interview</option>
                    <option>Offer</option>
                    <option>Rejected</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Notes</label>
                <textarea name="notes" placeholder="Any notes..."></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100">Save Application</button>
        </form>
    </div>
</div>
<div class="mb-3">
    <label>Notes</label>
    <textarea name="notes" class="form-control" placeholder="Any notes..."></textarea>
</div>

</body>
</html>
