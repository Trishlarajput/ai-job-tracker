<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🤖 AI Job Tracker</span>
    <a href="/" class="btn btn-secondary btn-sm">← Dashboard</a>
</nav>
<div class="container mt-4">
    <h3>AI Resume Analyzer</h3>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Your Resume Text</label>
            <textarea name="resume" class="form-control" rows="8" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Job Description</label>
            <textarea name="job_description" class="form-control" rows="8" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Analyze</button>
    </form>

    {% if result %}
    <div class="card mt-4 p-3">
        <h5>Analysis Result</h5>
        <pre style="white-space: pre-wrap;">{{ result }}</pre>
    </div>
    {% endif %}
</div>
</body>
</html>
